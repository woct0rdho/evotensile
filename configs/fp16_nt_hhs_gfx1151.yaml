# EvoTensile initial target descriptor.
# The actual TensileLite tuning YAML is generated by `evotensile pilot-yaml`.

target:
  gpu: gfx1151
  library_type: GridBased
  layout: NT
  data: HHS
  aux_h: false

pilot_grid:
  M: [512, 640, 896, 1024]
  N: [128, 256, 512, 768, 1024]
  batch: [1]
  K: [256, 512, 1024, 2048, 4096]

benchmark_policy:
  PredictionThreshold: 2.0
  NumWarmups: 2
  NumBenchmarks: 1
  NumElementsToValidate: 128
  SkipSlowSolutionRatio: 0.0

notes:
  - Candidates should be emitted as complete Groups entries, not Cartesian ForkParameters.
  - Do not use Formocast/PredictionThreshold pruning on gfx1151 until validated.
